<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="jpeg/png" href="./src/assets/c2logo3.png">
    <title>AI ChatBot</title>

    <link href="./src/style.css" rel="stylesheet">
    <link href="./output.css" rel="stylesheet">

    <script src="./src/script.js" defer></script>

    <!-- Linking Emoji Mart script for rmoji picker -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js" defer></script> -->

    <!-- Linking google font for icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="flex items-center justify-center min-h-screen w-full bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <!-- Animated background -->
    <div class="animated-bg"></div>

    <!-- Chatbot -->
    <div class="chatbot-popup fixed w-full md:w-[70vw] xl:w-[60vw] h-full md:h-[600px] bg-white/95 backdrop-blur-xl overflow-hidden rounded-none md:rounded-xl shadow-2xl border-0 md:border-[1px] border-white/20">

        <!-- Chatbot Header -->
        <div class="chat-header flex items-center justify-between bg-gradient-to-r from-violet-600 via-purple-600 to-indigo-600 py-4 sm:py-5 px-5 sm:px-6 relative overflow-hidden">
            <!-- Header glow effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-violet-400/20 to-indigo-400/20"></div>

            <div class="header-info flex gap-4 items-center relative z-10">
                <div class="relative">
                    <img src="./src/assets/botface.svg" alt="bot" class="chatbot-logo w-11 h-11 p-2 fill-purple-600 bg-white flex-shrink-0 rounded-xl shadow-lg">
                    <span class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-400 border-2 border-white rounded-full"></span>
                </div>
                <div class="flex flex-col">
                    <h2 class="logo-text text-white text-lg font-semibold tracking-tight">AI Chatbot</h2>
                    <span class="text-white/70 text-xs font-medium">Always here to help</span>
                </div>
            </div>

            <button class="material-symbols-outlined close-chatbot border-none text-white/90 h-10 w-10 text-2xl cursor-pointer rounded-xl hover:bg-white/10 hover:text-white transition-all duration-300 ease-out relative z-10">
                more_vert
            </button>
        </div>

        <!-- Chatbot body -->
        <div class="chat-body py-6 px-4 sm:px-5 flex gap-4 h-[calc(100%-180px)] sm:h-[420px] overflow-y-auto flex-col">
            <!-- Welcome message -->
            <div class="message bot-message flex gap-3 items-end animate-fadeIn">
                <div class="relative flex-shrink-0">
                    <img src="./src/assets/botavatar.svg" alt="bot" class="bot-avatar w-9 h-9 p-[6px] fill-white bg-gradient-to-br from-violet-500 to-purple-600 rounded-full shadow-md">
                </div>
                <div class="message-text py-3 px-4 max-w-[80%] text-[0.9rem] leading-relaxed bg-gradient-to-br from-gray-50 to-gray-100 text-gray-700 rounded-2xl rounded-bl-md shadow-sm border border-gray-100">
                    Hey there! <span class="wave-emoji">👋</span><br/>
                    <span class="text-gray-500">How can I help you today?</span>
                </div>
            </div>
        </div>

        <!-- Chat footer -->
        <div class="chat-footer absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-white/80 px-4 sm:px-5 pb-5 pt-4 flex backdrop-blur-sm">
            <form action="#" class="chat-form relative w-full flex items-center bg-white rounded-2xl shadow-lg border border-gray-200 focus-within:border-purple-400 focus-within:ring-4 focus-within:ring-purple-100 transition-all duration-300">

                <input type="text" placeholder="Type your message..." required class="message-input border-none outline-none h-14 w-full px-5 text-[15px] rounded-2xl bg-transparent placeholder:text-gray-400">

                <div class="chat-controls flex h-14 items-center pr-2 self-end gap-2">
                    <button type="button" id="emoji-picker" class="material-symbols-outlined h-10 w-10 border-none cursor-pointer text-gray-400 bg-none hover:bg-purple-50 hover:text-purple-500 rounded-xl text-xl transition-all duration-200">sentiment_satisfied</button>

                    <div class="file-upload-wrapper w-10 h-10 relative">
                        <input type="file" accept="image/*" id="file-input" hidden>
                        <img src="#" class="uploaded-img w-full h-full object-cover rounded-xl">
                        <button type="button" class="w-10 h-10 flex items-center justify-center rounded-xl transition-all duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" id="file-upload" class="h-5 w-5 border-none cursor-pointer fill-gray-400 hover:fill-purple-500 transition-all duration-200" viewBox="0 -960 960 960"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm40-80h480L570-480 450-320l-90-120-120 160Zm-40 80v-560 560Z"/></svg>
                        </button>
                        <button type="button" id="file-cancel" class="material-symbols-outlined text-white bg-red-400 hover:bg-red-500 w-5 h-5 rounded-full text-sm transition-all duration-200">close</button>
                    </div>
                    <button type="submit" class="material-symbols-outlined send-message h-10 w-10 border-none cursor-pointer text-white bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-600 hover:to-purple-700 rounded-full text-xl transition-all duration-300 shadow-md active:scale-95">arrow_upward</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Linking Emoji Mart script for rmoji picker -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>

</body>
</html>
